<html>
<link rel="stylesheet" href="style.css">

<head>
    <title>Mobile Portfolio</title>
</head>

<body>
    <header class="header">
        <nav class="header_nav">
            <div class="header_logo">My Logo</div>
            <div class="header_menu">
                <img class="background_shape" src="images/background_shape.svg" alt="menu">
            </div>
        </nav>
        <nav class="item_nav">
            <div class="nav_detail">
                <a href="#">
                    <img class="hamburger" src="images/hamburger.svg" alt="hamburger">
                </a>
            </div>
        </nav>
    </header>
    <main>
        <section class="headline">
            <h1 class="headline_title">I'm Thinus Glad to see you!</h1>
            <p class="headline_content">
                I'm a software developer! I can help you build a product, feature or website. Look through <br>some of
                my
                work and experience! If you like what you see and have a project you need <br>coded, don't hesitate to
                contact me.
            </p>
            <div class="headline_social">
                <h3 class="social_title">LET'S CONNECT</h3>
                <ul class="social_links">
                    <li class="social_link">
                        <a href="#">
                            <img class="social_icon" src="images/twitter.svg" alt="Twitter">
                        </a>
                    </li>
                    <li class="social_link">
                        <a href="#">
                            <img class="social_icon" src="images/linkedinicon.svg" alt="Linkedin">
                        </a>
                    </li>
                    <li class="social_link">
                        <a href="#">
                            <img class="social_icon" src="images/github.svg" alt="GitHub">
                        </a>
                    </li>
                </ul>
            </div>
        </section>

</html>
